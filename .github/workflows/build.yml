name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  dotnet:
    name: .NET Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore SapphWire.sln

      - name: Build
        run: dotnet build SapphWire.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test SapphWire.sln --no-build --configuration Release --verbosity normal

  web:
    name: Web Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/SapphWire.Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/SapphWire.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
